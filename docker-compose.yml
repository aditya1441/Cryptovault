# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║              CryptoVault — Docker Compose                                    ║
# ║  Services: postgres  ·  backend (FastAPI)  ·  frontend (React+nginx)         ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cryptovault-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cryptovault
      POSTGRES_USER: cryptovault
      POSTGRES_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in your .env file (copy from .env.example)}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # exposed so you can connect with pgAdmin / psql locally
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cryptovault -d cryptovault" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cryptovault-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://cryptovault:${DB_PASSWORD:?Set DB_PASSWORD in .env}@postgres:5432/cryptovault"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env - run: python -c 'import secrets; print(secrets.token_hex(32))'}"
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
      APP_ENV: production
      MAIL_EMAIL: ${MAIL_EMAIL}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FRONTEND_URL: ${VITE_API_URL:-http://localhost:80}
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── React Frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: cryptovault-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres_data:
