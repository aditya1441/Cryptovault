# alembic.ini
# ────────────
# Alembic is the database migration tool for SQLAlchemy.
# Migrations let you evolve your database schema (add columns, rename tables,
# etc.) without losing data — like "version control for your database".
#
# Usage:
#   alembic revision --autogenerate -m "add column to users"
#   alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .

# The database URL is read from the environment variable instead of hardcoding here
# (see alembic/env.py)
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
